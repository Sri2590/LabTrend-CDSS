services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labtrend_backend
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/labtrend.db
    networks:
      - labtrend_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: labtrend_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - labtrend_network
    restart: unless-stopped

volumes:
  db_data:
    driver: local

networks:
  labtrend_network:
    driver: bridge